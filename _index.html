<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Hub: Чат и Арена</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .sidebar { position: fixed; inset: 0; z-index: 50; transform: translateX(-100%); transition: transform 0.3s ease; width: 85vw; max-width: 320px; }
            .sidebar.open { transform: translateX(0); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
            .overlay.active { display: block; }
            #verdict-panel { max-height: 50vh; }
            .modal-sheet { bottom: 0; left: 0; right: 0; top: auto; max-height: 85vh; border-radius: 20px 20px 0 0; transform: translateY(100%); }
            .modal-sheet.active { transform: translateY(0); }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex overflow-hidden selection:bg-brand-100 selection:text-brand-700">

    <!-- Overlay for Mobile Sidebar -->
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar (History & Navigation) -->
    <aside id="sidebar" class="sidebar bg-white border-r border-slate-200 flex flex-col h-full flex-shrink-0 z-50 shadow-xl">
        <div class="p-4 border-b border-slate-100 flex items-center justify-between">
            <span class="font-bold text-slate-700">📂 История</span>
            <button onclick="toggleSidebar()" class="p-1 text-slate-400 hover:text-slate-600">✕</button>
        </div>

        <div class="p-3 border-b border-slate-100">
            <button onclick="newSession()" id="btn-new-chat" class="w-full py-2.5 bg-brand-500 hover:bg-brand-600 text-white font-medium rounded-xl shadow-md shadow-brand-500/20 transition-all flex items-center justify-center gap-2 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Новый диалог
            </button>
        </div>

        <div id="history-list" class="flex-1 overflow-y-auto p-3 space-y-2">
            <div class="text-center py-8 text-slate-400 text-sm">Нет сохранённых сессий</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden">

        <!-- Header -->
        <header class="bg-white border-b border-slate-200 shadow-sm flex-none z-30">
            <div class="px-4 h-14 flex items-center justify-between gap-4">
                <div class="flex items-center gap-3 min-w-0">
                    <button onclick="toggleSidebar()" class="p-2 -ml-2 text-slate-500 hover:text-brand-600 hover:bg-slate-100 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div class="w-8 h-8 bg-gradient-to-br from-brand-500 to-violet-600 rounded-lg flex items-center justify-center text-white shadow-md">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h1 class="text-lg font-bold truncate text-slate-800">AI Platform</h1>
                </div>

                <!-- Mode Switcher -->
                <nav class="bg-slate-100 p-1 rounded-lg flex items-center shrink-0">
                    <button id="tab-chat" onclick="switchView('chat')" class="px-3 py-1.5 rounded-md text-sm font-semibold transition-all shadow-sm bg-white text-slate-800 ring-1 ring-black/5">
                        💬 Чат
                    </button>
                    <button id="tab-arena" onclick="switchView('arena')" class="px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-200/50">
                        🏟️ Арена
                    </button>
                </nav>
            </div>
        </header>

        <!-- VIEW: Chatbot -->
        <div id="view-chat" class="flex-1 flex flex-col relative overflow-hidden transition-opacity duration-300">
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-6 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px]">
                <div class="text-center py-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-sm mb-4">
                        <span class="text-3xl">🎙️</span>
                    </div>
                    <h3 class="text-slate-800 font-bold text-lg">Голосовой Ассистент</h3>
                    <p class="text-slate-500 text-sm mt-1">Выберите модель и начните диалог</p>
                </div>
            </div>

            <div class="bg-white border-t border-slate-200 p-3 md:p-4 z-20">
                <div class="max-w-3xl mx-auto flex items-end gap-2 bg-slate-50 border border-slate-200 rounded-2xl p-2 focus-within:ring-2 focus-within:ring-brand-500/20 focus-within:border-brand-500 transition-all">
                    <button id="btn-mic" onclick="toggleRecording()" class="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8.25m6.5 0H16m-8 0h.25"></path></svg>
                    </button>
                    <input type="text" id="chat-input" placeholder="Сообщение..." class="flex-1 bg-transparent border-none text-slate-700 placeholder-slate-400 py-2.5 focus:ring-0 text-sm md:text-base resize-none">
                    <button id="btn-send-chat" onclick="sendChatMessage()" class="p-2.5 bg-brand-500 text-white rounded-xl hover:bg-brand-600 transition-all shrink-0 shadow-md shadow-brand-500/20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- VIEW: Arena -->
        <div id="view-arena" class="flex-1 flex flex-col relative overflow-hidden hidden transition-opacity duration-300 opacity-0">
            <!-- Arena Controls -->
            <div class="bg-white border-b border-slate-200 p-3 z-20 shadow-sm">
                <div class="max-w-5xl mx-auto flex flex-col md:flex-row gap-3">
                    <div class="flex gap-2 flex-1">
                        <select id="arena-model-a" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="llama3.2">Llama 3.2</option>
                            <option value="qwen2.5">Qwen 2.5</option>
                        </select>
                        <span class="self-center text-slate-400 font-bold text-xs">VS</span>
                        <select id="arena-model-b" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="qwen2.5">Qwen 2.5</option>
                            <option value="llama3.2">Llama 3.2</option>
                        </select>
                    </div>
                    <div class="flex gap-2 flex-1 md:flex-none">
                        <input id="arena-topic" type="text" placeholder="Тема диалога..." value="Влияние ИИ на образование" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-brand-500 outline-none">
                        <button id="btn-start-arena" onclick="startArena()" class="bg-brand-600 hover:bg-brand-700 text-white font-bold px-6 py-2 rounded-xl shadow-md shadow-brand-500/20 transition-all whitespace-nowrap flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Старт
                        </button>
                        <button id="btn-stop-arena" onclick="stopArena()" class="hidden bg-red-500 hover:bg-red-600 text-white font-bold px-3 py-2 rounded-xl shadow-md shadow-red-500/20 transition-all flex items-center justify-center">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Arena Messages -->
            <div id="arena-messages" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px]">
                <div id="empty-arena-state" class="flex flex-col items-center justify-center h-full text-slate-400 opacity-70 pb-10">
                    <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <p class="text-lg font-medium">Готово к запуску</p>
                    <p class="text-sm mt-1">Выберите модели и введите тему</p>
                </div>
                <div id="arena-msgs-container" class="max-w-4xl mx-auto space-y-8 pb-12 w-full"></div>
            </div>

            <!-- Arena Status Bar -->
            <div class="bg-white border-t border-slate-200 px-4 py-2 flex justify-between items-center text-xs text-slate-500 flex-none z-20 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                <div class="flex items-center gap-2">
                    <div id="status-indicator" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <span id="status-text">Готов</span>
                </div>
                <span id="turn-counter">Ходов: 0</span>
            </div>
        </div>

        <!-- Verdict Panel (Slide Up) -->
        <div id="verdict-panel" class="absolute bottom-0 left-0 right-0 glass-panel border-t border-slate-200 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] p-4 md:p-6 transition-transform duration-500 transform translate-y-full z-40 max-h-[40vh] overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex items-center gap-3 mb-4">
                    <div class="p-2 bg-amber-100 rounded-full text-amber-700 shrink-0">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-slate-800">Вердикт Судьи</h3>
                        <p class="text-xs text-slate-500">Анализ завершен</p>
                    </div>
                    <button onclick="closeVerdict()" class="ml-auto p-2 hover:bg-slate-100 rounded-lg text-slate-400 hover:text-slate-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div id="verdict-content" class="prose prose-slate prose-sm max-w-none bg-slate-50 p-4 rounded-xl border border-slate-200 text-sm font-mono text-slate-700 whitespace-pre-wrap shadow-inner"></div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 bg-slate-800 text-white px-4 py-3 rounded-xl shadow-lg shadow-slate-900/20 transform translate-x-[150%] transition-transform duration-300 z-[60] text-sm flex items-center gap-3 font-medium">
        <span id="toast-icon" class="text-lg">ℹ️</span>
        <span id="toast-msg">Сообщение</span>
    </div>

    <!-- Session Modal -->
    <div id="session-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-0 sm:p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-none sm:rounded-2xl shadow-2xl w-full h-full sm:max-h-[85vh] sm:max-w-4xl flex flex-col transform scale-95 transition-transform duration-300 overflow-hidden ring-1 ring-slate-200 modal-sheet">
            <div class="flex-none p-4 border-b border-slate-100 flex items-center justify-between bg-white">
                <div class="min-w-0 mr-4 flex-1">
                    <h3 id="modal-topic" class="text-base sm:text-lg font-bold text-slate-800 truncate">Тема сессии</h3>
                    <div id="modal-meta" class="text-xs text-slate-500 mt-0.5 font-mono flex items-center gap-2 flex-wrap">
                        <span class="w-2 h-2 rounded-full bg-slate-300 shrink-0"></span>
                        <span class="truncate">ID сессии</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button onclick="exportSession()" class="p-2 text-slate-500 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition-colors" title="Экспорт">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </button>
                    <button onclick="deleteSession()" class="p-2 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Удалить">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <button onclick="closeModal()" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
            <div id="modal-chat" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 bg-slate-50 min-h-0"></div>
            <div id="modal-verdict" class="flex-none max-h-[30vh] overflow-y-auto p-4 bg-amber-50/80 border-t border-amber-100 hidden">
                <h4 class="text-xs font-bold text-amber-700 uppercase mb-2 flex items-center gap-2 sticky top-0 bg-amber-50/80 py-2 -mt-2">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Решение судьи
                </h4>
                <div id="modal-verdict-text" class="text-sm text-slate-700 whitespace-pre-line font-mono leading-relaxed"></div>
            </div>
        </div>
    </div>

<script>
    // ===== STATE =====
    let currentView = 'chat';
    let isRecording = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let currentConvId = null;
    let currentModel = 'llama3.2:latest';
    let currentSessionId = null;
    let currentViewSession = null;
    let currentSessionData = null;
    let evtSource = null;
    let isArenaRunning = false;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let typingEls = {};
    let currentTurn = 0;
    const MAX_RECONNECT = 10;

    // ===== UI ELEMENTS =====
    const arenaContainer = document.getElementById('arena-messages');
    const messagesDiv = document.getElementById('arena-msgs-container');
    const statusText = document.getElementById('status-text');
    const statusIndicator = document.getElementById('status-indicator');
    const turnCounter = document.getElementById('turn-counter');
    const startBtn = document.getElementById('btn-start-arena');
    const stopBtn = document.getElementById('btn-stop-arena');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const historyList = document.getElementById('history-list');
    const chatContainer = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const micBtn = document.getElementById('btn-mic');

    // ===== UTILS =====
    function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); }
    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function scrollToBottom() { setTimeout(() => { arenaContainer.scrollTo({ top: arenaContainer.scrollHeight, behavior: 'smooth' }); }, 50); }
    function scrollChatToBottom() { setTimeout(() => { chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' }); }, 50); }

    function updateStatus(text, type = 'ready') {
        if (!statusText) return;
        statusText.textContent = text;
        statusIndicator.className = 'w-2 h-2 rounded-full';
        if (type === 'active') statusIndicator.classList.add('bg-emerald-500', 'animate-pulse');
        else if (type === 'typing') statusIndicator.classList.add('bg-amber-500', 'animate-pulse');
        else if (type === 'error') statusIndicator.classList.add('bg-red-500');
        else statusIndicator.classList.add('bg-emerald-500');
    }

    function updateTurnCounter(turn) { if (turnCounter) turnCounter.textContent = `Ходов: ${turn}`; }

    function showToast(msg, type = 'info') {
        const toast = document.getElementById('toast');
        document.getElementById('toast-msg').textContent = msg;
        document.getElementById('toast-icon').textContent = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
        toast.classList.remove('translate-x-[150%]');
        toast.classList.add('translate-x-0');
        setTimeout(() => toast.classList.add('translate-x-[150%]'), 3000);
    }

    // ===== NAVIGATION =====
    function switchView(view) {
        currentView = view;
        const chatView = document.getElementById('view-chat');
        const arenaView = document.getElementById('view-arena');
        const chatTab = document.getElementById('tab-chat');
        const arenaTab = document.getElementById('tab-arena');

        if (view === 'chat') {
            chatView.classList.remove('hidden', 'opacity-0');
            arenaView.classList.add('opacity-0');
            setTimeout(() => arenaView.classList.add('hidden'), 300);
            chatTab.className = "px-3 py-1.5 rounded-md text-sm font-semibold transition-all shadow-sm bg-white text-slate-800 ring-1 ring-black/5";
            arenaTab.className = "px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-200/50";
        } else {
            arenaView.classList.remove('hidden', 'opacity-0');
            chatView.classList.add('opacity-0');
            setTimeout(() => chatView.classList.add('hidden'), 300);
            arenaTab.className = "px-3 py-1.5 rounded-md text-sm font-semibold transition-all shadow-sm bg-white text-slate-800 ring-1 ring-black/5";
            chatTab.className = "px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-200/50";
        }
        loadHistory();
    }

    // ===== CHAT LOGIC (REAL API) =====
    async function loadModels() {
        try {
            const res = await fetch('/api/models');
            const data = await res.json();
            const models = data.models || [];
            if (models.length > 0) currentModel = models[0];
            return models;
        } catch (e) { console.error('Failed to fetch models', e); return []; }
    }

    async function newConversation() {
        try {
            const res = await fetch('/api/conversation/new', { method: 'POST' });
            const data = await res.json();
            currentConvId = data.conversation_id;
            return currentConvId;
        } catch (e) { console.error('Failed to create conversation', e); return null; }
    }

    async function ensureConversation() {
        if (!currentConvId) await newConversation();
        return currentConvId;
    }

    function addChatMessage(role, content, audio = null) {
        const isUser = role === 'user';
        const div = document.createElement('div');
        div.className = `flex w-full fade-in ${isUser ? 'justify-end' : 'justify-start'}`;

        const bubbleClass = isUser
            ? 'bg-brand-500 text-white rounded-2xl rounded-tr-none'
            : 'bg-white border border-slate-200 rounded-2xl rounded-tl-none';

        div.innerHTML = `
            <div class="max-w-[85%] ${bubbleClass} p-3.5 shadow-sm">
                <div class="text-sm whitespace-pre-wrap">${escapeHtml(content)}</div>
                ${!isUser && audio ? `
                    <button onclick="playAudio('${audio}')" class="mt-2 text-xs text-brand-600 hover:text-brand-700 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                        🔊 Озвучить
                    </button>
                ` : ''}
            </div>
        `;

        const existingEmpty = chatContainer.querySelector('.text-center');
        if (existingEmpty) existingEmpty.remove();

        chatContainer.appendChild(div);
        scrollChatToBottom();

        if (audio) window.lastAudio = audio;
    }

    function playAudio(base64) {
        if (!base64) return;
        const audio = new Audio(`data:audio/ogg;base64,${base64}`);
        audio.play().catch(e => console.log('Audio play failed:', e));

        div.id = 'chat-typing';

        div.innerHTML = `

    function removeTypingIndicator() {
        const el = document.getElementById('chat-typing');
        if (el) el.remove();
    }

    async function sendChatMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        chatInput.value = '';
        addChatMessage('user', text);

        await ensureConversation();

        addTypingIndicator();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    conversation_id: currentConvId,
                    model: currentModel
                })
            });

            const data = await res.json();
            removeTypingIndicator();

            if (data.response) {
                addChatMessage('assistant', data.response, data.audio);
                if (data.audio) playAudio(data.audio);
            } else if (data.error) {
                addChatMessage('assistant', `❌ ${data.error}`);
            }

            loadHistory();
        } catch (e) {
            removeTypingIndicator();
            addChatMessage('assistant', '⚠️ Ошибка соединения');
        }
    }

    async function toggleRecording() {
        if (isRecording) {
            mediaRecorder?.stop();
            isRecording = false;
            micBtn.classList.remove('text-red-500', 'bg-red-50');
            micBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8.25m6.5 0H16m-8 0h.25"></path></svg>`;
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => { if (e.data.size) audioChunks.push(e.data); };

            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const fd = new FormData();
                fd.append('audio', blob, 'voice.webm');
                if (currentConvId) fd.append('conv_id', currentConvId);

                chatInput.placeholder = '🎤 Распознавание...';

                try {
                    const res = await fetch('/api/voice', { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.text) {
                        chatInput.value = data.text;
                        sendChatMessage();
                    } else {
                        chatInput.placeholder = 'Не распознано';
                        setTimeout(() => chatInput.placeholder = 'Сообщение...', 1500);
                    }
                } catch (e) {
                    chatInput.placeholder = 'Ошибка';
                    setTimeout(() => chatInput.placeholder = 'Сообщение...', 1500);
                }

                stream.getTracks().forEach(t => t.stop());
                chatInput.placeholder = 'Сообщение...';
            };

            mediaRecorder.start();
            isRecording = true;
            micBtn.classList.add('text-red-500', 'bg-red-50');
            micBtn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>`;
        } catch (e) {
            showToast('Нет доступа к микрофону', 'error');
        }
    }

    async function loadChatSession(convId) {
        try {
            const res = await fetch(`/api/conversation/${convId}`);
            const data = await res.json();

            chatContainer.innerHTML = '';
            currentConvId = convId;

            if (!data.messages || data.messages.length === 0) {
                chatContainer.innerHTML = `
                    <div class="text-center py-8">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-sm mb-4">
                            <span class="text-3xl">💬</span>
                        </div>
                        <h3 class="text-slate-800 font-bold text-lg">Пустой диалог</h3>
                    </div>
                `;
            } else {
                data.messages.forEach(m => addChatMessage(m.role, m.content, null));
            }

            switchView('chat');
            toggleSidebar();
        } catch (e) {
            showToast('Ошибка загрузки чата', 'error');

    // ===== ARENA LOGIC (REAL API) =====
    async function fetchModels() {
        try {
            const models = await loadModels();
            const selA = document.getElementById('arena-model-a');
            const selB = document.getElementById('arena-model-b');
            if (!selA || !selB) return;
            const options = models.map(m => `<option value="${m}">${m}</option>`).join('');
            selA.innerHTML = options;
            selB.innerHTML = options;
            if (models.length > 1) selB.selectedIndex = 1;
        } catch (e) { console.error('Failed to fetch models', e); }

    async function startArena() {
        if (isArenaRunning) return;
        const topic = document.getElementById('arena-topic').value.trim();
        if (!topic) return showToast('Пожалуйста, введите тему', 'error');

        isArenaRunning = true;
        startBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');
        stopBtn.classList.add('flex');
        document.getElementById('arena-model-a').disabled = true;
        document.getElementById('arena-model-b').disabled = true;
        document.getElementById('arena-topic').disabled = true;

        messagesDiv.innerHTML = '';
        document.getElementById('empty-arena-state').classList.add('hidden');
        document.getElementById('verdict-panel').classList.add('translate-y-full', 'hidden');
        document.getElementById('verdict-panel').classList.remove('translate-y-0');
        currentTurn = 0;
        updateTurnCounter(0);
        updateStatus('Запуск арены...', 'active');

        try {
            const resp = await fetch('/api/arena/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    topic,
                    model_a: document.getElementById('arena-model-a').value,
                    model_b: document.getElementById('arena-model-b').value,
                    max_turns: 12
                })
            });
            const data = await resp.json();
            currentSessionId = data.session_id;
            evtSource = new EventSource(`/api/arena/stream/${currentSessionId}`);
            attachEventHandlers(evtSource);
        } catch (err) {
            console.error('Ошибка запуска арены:', err);
            updateStatus(`Ошибка: ${err.message}`, 'error');
            cleanup();
            isArenaRunning = false;
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
        }
    }

    function stopArena() {
        if (isArenaRunning) updateStatus('Остановка...', 'typing');
        isArenaRunning = false;
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
        stopBtn.classList.remove('flex');
        document.getElementById('arena-model-a').disabled = false;
        document.getElementById('arena-model-b').disabled = false;
        document.getElementById('arena-topic').disabled = false;

        if (currentSessionId) fetch(`/api/arena/stop/${currentSessionId}`, { method: 'POST' }).catch(()=>{});
        cleanup();
    }

    function cleanup() {
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
        if (evtSource) { evtSource.close(); evtSource = null; }
        reconnectAttempts = 0;
        loadHistory();
    }

    function attachEventHandlers(source) {
        source.onmessage = (e) => {
            if (!e.data || e.data.startsWith(':')) return;
            try {
                const d = JSON.parse(e.data);
                if (d.type === 'typing') {
                    updateStatus(`Модель ${d.model} печатает...`, 'typing');
                    addArenaTypingIndicator(d.model);
                } else if (d.type === 'message') {
                    removeArenaTypingIndicator(d.model);
                    addMessageBubble(d.model, d.content);
                    updateStatus('Диалог активен', 'active');
                    currentTurn++;
                    updateTurnCounter(Math.ceil(currentTurn / 2));
                    reconnectAttempts = 0;
                } else if (d.type === 'error') {
                    removeArenaTypingIndicator(d.model);
                    addMessageBubble(d.model, `⚠️ ${d.error}`);
                    updateStatus(`Ошибка: ${d.error}`, 'error');
                } else if (d.type === 'judge_thinking') {
                    updateStatus('Судья анализирует...', 'typing');
                } else if (d.type === 'verdict') {
                    showVerdict(d.content);
                    updateStatus('Анализ завершён', 'ready');
                } else if (d.type === 'stopped' || d.type === 'finished') {
                    cleanup();
                    updateStatus(d.type === 'stopped' ? 'Диалог остановлен' : 'Диалог завершён', 'ready');
                    showToast(d.type === 'stopped' ? '⏹ Диалог остановлен' : '✅ Диалог завершён', 'success');
                    startBtn.classList.remove('hidden');
                    stopBtn.classList.add('hidden');
                    stopBtn.classList.remove('flex');
                    document.getElementById('arena-model-a').disabled = false;
                    document.getElementById('arena-model-b').disabled = false;
                    document.getElementById('arena-topic').disabled = false;
                    isArenaRunning = false;
                }
            } catch (err) { console.error('Parse error:', err, e.data); }
        };

        source.onerror = (err) => {
            console.warn('SSE error:', err);
            if (currentSessionId && isArenaRunning && reconnectAttempts < MAX_RECONNECT) {
                reconnectAttempts++;
                updateStatus(`Переподключение (${reconnectAttempts}/${MAX_RECONNECT})...`, 'typing');
                if (evtSource) { evtSource.close(); evtSource = null; }
                const delay = Math.min(3000, 1000 * reconnectAttempts) + Math.random() * 500;
                reconnectTimer = setTimeout(() => {
                    reconnectTimer = null;
                    if (currentSessionId && isArenaRunning) {
                        evtSource = new EventSource(`/api/arena/stream/${currentSessionId}`);
                        attachEventHandlers(evtSource);
                    }
                }, delay);
            } else {
                cleanup();
                updateStatus('Соединение потеряно', 'error');
            }
        };
    }

                    <div class="w-2.5 h-2.5 rounded-full ${isA ? 'bg-emerald-500' : 'bg-blue-500'} ring-2 ring-white"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Модель ${model}</span>

                <div class="text-sm sm:text-[15px] leading-relaxed whitespace-pre-wrap font-medium">${escapeHtml(text)}</div>

                </div>
            </div>`;

    function removeArenaTypingIndicator(model) {
        if (typingEls[model]) {
            const el = typingEls[model];
            el.style.opacity = '0';
            el.style.transform = 'scale(0.9)';

    function showVerdict(text) {
        const el = document.getElementById('verdict-panel');
        const content = document.getElementById('verdict-content');
        let formatted = text.replace(/\*\*/g, '').replace(/\*/g, '•')
            .replace(/Модель А сильные стороны:/g, '\n🟢 СИЛЬНЫЕ СТОРОНЫ А:\n•')
            .replace(/Модель А слабые стороны:/g, '\n🔻 СЛАБЫЕ СТОРОНЫ А:\n•')
            .replace(/Модель Б сильные стороны:/g, '\n🔵 СИЛЬНЫЕ СТОРОНЫ Б:\n•')
            .replace(/Модель Б слабые стороны:/g, '\n🔻 СЛАБЫЕ СТОРОНЫ Б:\n•')
            .replace(/ВЕРДИКТ:/g, '\n⚖️ ВЕРДИКТ:')
            .replace(/ОБОСНОВАНИЕ:/g, '\n📝 ОБОСНОВАНИЕ:');

        content.textContent = formatted;
        el.classList.remove('hidden');

        requestAnimationFrame(() => {
            el.classList.remove('translate-y-full');
            el.classList.add('translate-y-0');
        });
    }

    function closeVerdict() {
        const el = document.getElementById('verdict-panel');
        el.classList.remove('translate-y-0');
        el.classList.add('translate-y-full');
        setTimeout(() => el.classList.add('hidden'), 500);
    }

    // ===== HISTORY & MODALS =====
    async function loadHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = '<div class="text-center py-4 text-slate-400 text-sm">Загрузка...</div>';
        try {
            const ep = currentView === 'chat' ? '/api/conversations' : '/api/sessions';
            const resp = await fetch(ep);
            const data = await resp.json();
            const items = currentView === 'chat' ? (data.conversations || []) : (data.sessions || []);

            list.innerHTML = '';
            if (!items.length) {
                list.innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">Нет сохранённых сессий</div>';
                return;
            }

            items.forEach(s => {
                const item = document.createElement('div');
                item.className = 'p-3 rounded-xl cursor-pointer transition-all border border-transparent hover:border-slate-200 hover:bg-slate-50';
                const title = currentView === 'chat' ? (s.title || 'Новый диалог') : (s.topic || 'Без темы');
                const meta = currentView === 'chat'
                    ? `${s.message_count || 0} сообщ. • ${new Date(s.created_at).toLocaleDateString()}`
                    : `${s.model_a || '?'} vs ${s.model_b || '?'} • ${s.turns || 0} ходов`;
                const status = currentView === 'arena'
                    ? `<span class="text-[10px] px-2 py-0.5 rounded-full ${s.status === 'finished' ? 'bg-emerald-100 text-emerald-700' : s.status === 'stopped' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">${s.status}</span>`
                    : '';

                item.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-400">${currentView === 'chat' ? '💬 Чат' : '🏟️ Арена'}</span>
                        ${status}
                    </div>
                    <div class="text-sm font-medium text-slate-700 truncate">${escapeHtml(title)}</div>
                    <div class="text-xs text-slate-400 mt-1">${meta}</div>
                `;
                item.onclick = () => {
                    currentView === 'chat' ? loadChatSession(s.id) : openSessionModal(s.id);
                    if (window.innerWidth <= 768) toggleSidebar();
                };
                list.appendChild(item);
            });
        } catch (e) {
            list.innerHTML = '<div class="text-center py-8 text-red-400 text-sm">Ошибка загрузки</div>';
        }
    }

    async function openSessionModal(sid) {
        currentViewSession = sid;
        const modal = document.getElementById('session-modal');
        const modalChat = document.getElementById('modal-chat');
        modal.classList.remove('hidden');
        requestAnimationFrame(() => {
            modal.classList.remove('opacity-0');
            const inner = modal.querySelector('div');
            inner.classList.remove('scale-95', 'translate-y-full');
            inner.classList.add('scale-100', 'translate-y-0');
        });
        modalChat.innerHTML = '<div class="flex flex-col items-center justify-center py-12 text-slate-400"><svg class="animate-spin h-8 w-8 text-brand-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span>Загрузка...</span></div>';
        document.getElementById('modal-verdict').classList.add('hidden');

        try {
            const resp = await fetch(`/api/session/${sid}`);
            const data = await resp.json();
            const sesRes = await fetch('/api/sessions');
            const sesData = await sesRes.json();
            const sessionInfo = sesData.sessions.find(s => s.id === sid);
            currentSessionData = {
                ...data,
                topic: sessionInfo?.topic || 'Без темы',
                model_a: sessionInfo?.model_a || '?',
                model_b: sessionInfo?.model_b || '?',
                verdict: sessionInfo?.verdict || null
            };

            if (sessionInfo) {
                document.getElementById('modal-topic').textContent = sessionInfo.topic || 'Без темы';
                document.getElementById('modal-meta').innerHTML = `<span class="px-1.5 py-0.5 bg-slate-100 rounded text-slate-600">A</span> ${sessionInfo.model_a} <span class="text-slate-400 mx-1">vs</span> <span class="px-1.5 py-0.5 bg-slate-100 rounded text-slate-600">B</span> ${sessionInfo.model_b}`;
                if (sessionInfo.verdict) {
                    document.getElementById('modal-verdict').classList.remove('hidden');

            renderModalContent(data);
        } catch (e) {
            modalChat.innerHTML = '<div class="text-center text-red-500 py-8">Ошибка загрузки</div>';
        }

    function renderModalContent(data) {
        const chat = document.getElementById('modal-chat');
        chat.innerHTML = '';
        const msgs = data.messages.filter((m, i) => !(i === 0 && m.role === 'user'));
        if (!msgs.length) {
            chat.innerHTML = '<p class="text-center text-slate-400 py-8">Сообщений нет</p>';
            return;
        }
        msgs.forEach(m => {
            const isA = m.model === 'A';
            const div = document.createElement('div');
            div.className = `flex w-full fade-in ${isA ? 'justify-start' : 'justify-end'}`;
            div.innerHTML = `
                <div class="max-w-[85%] rounded-xl p-3 shadow-sm ${isA ? 'bg-white border border-slate-200' : 'bg-brand-50 border border-brand-100'}">
                    <div class="text-[10px] font-bold opacity-60 mb-1 uppercase">${isA ? 'Модель А' : 'Модель Б'}</div>
                    <div class="text-sm whitespace-pre-wrap">${escapeHtml(m.content)}</div>
                </div>`;
            chat.appendChild(div);
        });

        const modal = document.getElementById('session-modal');

        const inner = modal.querySelector('div');
        inner.classList.add('scale-95', 'translate-y-full');
        inner.classList.remove('scale-100', 'translate-y-0');

    async function deleteSession() {
        if (!currentViewSession || !confirm('Удалить сессию?')) return;
        const endpoint = currentView === 'chat' ? 'conversation' : 'session';
        try {
            await fetch(`/api/${endpoint}/${currentViewSession}`, { method: 'DELETE' });
            showToast('Удалено', 'success');
            closeModal();
            loadHistory();

    function exportSession() {
        if (!currentSessionData) return showToast('Нет данных', 'error');
        const { topic, model_a, model_b, verdict } = currentSessionData;
        let txt = `АРЕНА МОДЕЛЕЙ: ЭКСПОРТ\nДата: ${new Date().toLocaleString()}\nID: ${currentViewSession}\nМодели: ${model_a} vs ${model_b}\nТема: ${topic}\n${'='.repeat(50)}\n\n`;
        currentSessionData.messages.forEach(m => {
            if (m.model) txt += `[${m.model === 'A' ? 'МОДЕЛЬ А' : 'МОДЕЛЬ Б'}]: ${m.content}\n\n`;
        });
        if (verdict) txt += `${'='.repeat(50)}\nВЕРДИКТ СУДЬИ:\n${verdict}`;
        const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `arena_${currentViewSession.slice(0, 8)}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('Файл сохранён', 'success');
    }

        if (window.innerWidth <= 768) toggleSidebar();
    }

    // ===== EVENT LISTENERS =====
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
    document.getElementById('arena-topic').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !isArenaRunning) startArena(); });
    document.getElementById('session-modal').addEventListener('click', (e) => { if (e.target.id === 'session-modal') closeModal(); });

    // ===== INIT =====
    (async () => {
        await loadModels();
        await fetchModels();
        loadHistory();
    })();
</script>
</body>
</html>
